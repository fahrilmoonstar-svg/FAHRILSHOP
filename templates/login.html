<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:450px;margin:auto;}
        .pesan{padding:10px;border-radius:4px;margin-bottom:10px;}
        .error{background:#ffebee;color:#b71c1c;}
        input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:4px;box-sizing:border-box;}
        button{width:100%;padding:12px;background:#4caf50;color:white;border:none;border-radius:4px;}
    </style>
</head>
<body>
    <h2>🔐 LOGIN ADMIN</h2>
    {% with pesan = get_flashed_messages() %}
        {% if pesan %}
            <div class="pesan error">{{ pesan[0] }}</div>
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Username :</label>
        <input type="text" name="username" required>

        <label>Password :</label>
        <input type="password" name="password" required>

        <br>
        <button type="submit">MASUK</button>
    </form>
    <br>
    <a href="/" style="color:#666;">⬅ Kembali ke Toko</a>
</body>
</html>
