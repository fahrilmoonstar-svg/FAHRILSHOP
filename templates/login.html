<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Fahril Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gelap: '#050505', biru: '#0099FF', abu: '#1A1A1A' },
                    fontFamily: { utama: ['Orbitron', 'sans-serif'], teks: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gelap text-white font-teks min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-abu/80 p-8 rounded-2xl border border-biru/40 shadow-xl">
        <div class="text-center mb-6">
            <i class="fa fa-lock text-biru text-4xl mb-2"></i>
            <h2 class="text-2xl font-utama font-bold text-biru">AKSES ADMIN</h2>
        </div>

        {% with pesan = get_flashed_messages() %}
        {% if pesan %}
            <div class="mb-4 p-3 rounded bg-red-500/20 border border-red-500 text-red-300 text-center">
                {{ pesan[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-gray-300">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2 rounded bg-black/50 border border-gray-600 focus:border-biru outline-none" required>
            </div>
            <div>
                <label class="block text-sm mb-1 text-gray-300">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2 rounded bg-black/50 border border-gray-600 focus:border-biru outline-none" required>
            </div>
            <button type="submit" class="w-full bg-biru hover:bg-biru/80 py-3 rounded-lg font-bold transition">MASUK</button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-gray-400 hover:text-biru text-sm">← Kembali ke Halaman Utama</a>
        </div>
    </div>
</body>
</html>
