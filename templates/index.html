<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Fahril</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:480px;margin:auto;}
        .hasil{background:#e8f5e9;padding:12px;border-radius:5px;margin:10px 0;border-left:4px solid #2e7d32;}
        .btn-wa{display:block;text-align:center;padding:12px;background:#25d366;color:white;text-decoration:none;border-radius:5px;margin-top:10px;font-weight:bold;}
        select, input{width:100%;padding:10px;margin:6px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:4px;}
        button{width:100%;padding:12px;background:#2196f3;color:white;border:none;border-radius:4px;font-size:16px;}
    </style>
</head>
<body>
    <h2>🛒 Toko Fahril</h2>

    {% if hasil %}
    <div class="hasil">
        ✅ Pesanan Berhasil<br>
        Produk : {{ hasil.produk }}<br>
        Jumlah : {{ hasil.jumlah }} pcs<br>
        Total  : Rp {{ hasil.total }}
        {% if link_wa %}
            <a href="{{ link_wa }}" target="_blank" class="btn-wa">📲 PESAN VIA WHATSAPP</a>
        {% endif %}
    </div>
    {% endif %}

    <form method="POST">
        <label>Pilih Produk :</label><br>
        <select name="produk" required>
            {% for p in produk %}
            <option value="{{ p.id }}">{{ p.nama }} - Rp {{ p.harga }}</option>
            {% endfor %}
        </select><br>

        <label>Jumlah :</label><br>
        <input type="number" name="jumlah" value="1" min="1"><br>

        <label>Diskon (%) :</label><br>
        <input type="number" name="diskon" value="0" min="0" max="100"><br><br>

        <button type="submit">TAMPILKAN PESANAN</button>
    </form>

    <br>
    <a href="/login" style="color:#666;">🔐 Masuk Halaman Admin</a>
</body>
</html>
