// đź¤– FUNGSI HANDLER PESAN BOT
const config = { prefix: '.' };
async function updateUser(jid, data) {
    if (!window.userData) window.userData = {};
    if (!window.userData[jid]) window.userData[jid] = {};
    Object.assign(window.userData[jid], data);
    return window.userData[jid];
}
async function executeCommand(sock, m, cmd, args) {
    console.log(`Perintah: ${cmd}, Argumen: ${args}`);
    if (cmd === 'menu') {
        await sock.sendMessage(m.key.remoteJid, { text: `đź“‹ MENU FAHRIL SHOP đź›’\n\nâ€˘ .mlbb â†’ Daftar harga MLBB\nâ€˘ .ff â†’ Daftar harga Free Fire\nâ€˘ .edit â†’ Jasa edit video\nâ€˘ .kuota â†’ Daftar paket data` });
    }
}
async function handleMessage(sock, m) {
    if (!m.message || !m.key?.remoteJid) return;
    const from = m.key.remoteJid;
    const text = (m.message.conversation || m.message.extendedTextMessage?.text || "").trim();
    if (!text || !text.startsWith(config.prefix)) return;
    const argsArray = text.slice(config.prefix.length).trim().split(/\s+/);
    const cmd = argsArray.shift().toLowerCase();
    const args = argsArray.join(" ");
    await updateUser(from, { lastUsed: Date.now() });
    await executeCommand(sock, m, cmd, args);
}
if (typeof module !== 'undefined' && module.exports) { module.exports = { handleMessage }; }

// đźŽŻ FUNGSI TOMBOL INTERAKTIF
const title = document.querySelector("#title");
const btn = document.querySelector("#btn");
title.style.color = "red";

btn.addEventListener("click", function() {

// đźŽ® KODE GAME LENGKAP & DIPERBAIKI
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Variabel dasar game
let currentMode = 'sampah';
let items = [];
let particles = [];
let score = { sampah: 0, air: 0 };

// Ambil elemen tombol & teks
const btnSampah = document.getElementById('btnSampah');
const btnAir = document.getElementById('btnAir');
const btnClear = document.getElementById('btnClear');
const scoreSampahTxt = document.getElementById('scoreSampahTxt');
const scoreAirTxt = document.getElementById('scoreAirTxt');
const currentModeTxt = document.getElementById('currentModeTxt');

// Kelas Robot
class Robot {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.size = 20;
        this.speed = 5;
    }
    update() {
        // Contoh gerakan sederhana
        if (keys.ArrowUp && this.y > 0) this.y -= this.speed;
        if (keys.ArrowDown && this.y < canvas.height - this.size) this.y += this.speed;
        if (keys.ArrowLeft && this.x > 0) this.x -= this.speed;
        if (keys.ArrowRight && this.x < canvas.width - this.size) this.x += this.speed;
    }
    draw() {
        ctx.fillStyle = '#2563eb';
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.strokeStyle = '#1e40af';
        ctx.strokeRect(this.x, this.y, this.size, this.size);
    }
}
const robot = new Robot();
const keys = {};

// Kontrol keyboard
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Fungsi gambar garis kisi
function drawGridFloor() {
    ctx.strokeStyle = '#e1e8ed';
    ctx.lineWidth = 1;
    const gridSize = 40;
    for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

// Fungsi bantu
function updateParticles() {
    particles.forEach((p, i) => {
        p.y += p.speed;
        p.opacity -= 0.02;
        if (p.opacity <= 0) particles.splice(i, 1);
    });
}
function drawParticles() {
    particles.forEach(p => {
        ctx.fillStyle = `rgba(${p.color}, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
}
function drawItems() {
    items.forEach((item, i) => {
        ctx.fillStyle = item.type === 'sampah' ? '#854d0e' : '#3b82f6';
        ctx.beginPath();
        ctx.arc(item.x, item.y, 8, 0, Math.PI * 2);
        ctx.fill();
        // Cek tabrakan
        const jarak = Math.hypot(robot.x - item.x, robot.y - item.y);
        if (jarak < robot.size) {
            if (item.type === currentMode) {
                score[item.type]++;
                if (item.type === 'sampah') scoreSampahTxt.textContent = score.sampah;
                else scoreAirTxt.textContent = score.air;
                // Tambah efek partikel
                for (let j = 0; j < 8; j++) {
                    particles.push({
                        x: item.x, y: item.y,
                        speed: Math.random() * 2 + 1,
                        size: Math.random() * 3 + 1,
                        opacity: 1,
                        color: item.type === 'sampah' ? '133, 77, 14' : '59, 130, 246'
                    });
                }
            }
            items.splice(i, 1);
        }
    });
}

// Tambah item acak
setInterval(() => {
    const type = Math.random() > 0.5 ? 'sampah' : 'air';
    items.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        type: type
    });
}, 1200);

// Event tombol mode
btnSampah.addEventListener('click', () => {
    currentMode = 'sampah';
    btnSampah.classList.add('active');
    btnAir.classList.remove('active');
    currentModeTxt.innerText = 'đź—‘ď¸Ź SAMPAH';
    currentModeTxt.style.color = '#854d0e';
});

btnAir.addEventListener('click', () => {
    currentMode = 'air';
    btnAir.classList.add('active');
    btnSampah.classList.remove('active');
    currentModeTxt.innerText = 'đź’§ AIR';
    currentModeTxt.style.color = '#3498db';
});

// Event tombol reset
btnClear.addEventListener('click', () => {
    items = [];
    particles = [];
    score.sampah = 0;
    score.air = 0;
    scoreSampahTxt.innerText = '0';
    scoreAirTxt.innerText = '0';
});

// Loop utama game
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGridFloor();
    robot.update();
    updateParticles();
    drawItems();
    robot.draw();
    drawParticles();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
