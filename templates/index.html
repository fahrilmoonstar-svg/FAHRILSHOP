<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahril Shop</title>
    <style>body{font-family:Arial;padding:15px;max-width:480px;margin:auto;} .hasil{background:#e8f5e9;padding:10px;border-radius:5px;margin:10px 0;}</style>
</head>
<body>
    <h2>🛒 Toko Fahril</h2>
    {% if hasil %}
    <div class="hasil">
        ✅ Pesanan berhasil<br>
        Produk: {{ hasil.produk }}<br>
        Jumlah: {{ hasil.jumlah }}<br>
        Total: Rp {{ hasil.total }}
    </div>
    {% endif %}

    <form method="POST">
        <label>Pilih Produk:</label><br>
        <select name="produk" required style="width:100%;padding:8px;margin:5px 0;">
            {% for p in produk %}
            <option value="{{ p.id }}">{{ p.nama }} - Rp {{ p.harga }}</option>
            {% endfor %}
        </select><br>
        <label>Jumlah:</label><br>
        <input type="number" name="jumlah" value="1" min="1" style="width:100%;padding:8px;margin:5px 0;"><br>
        <label>Diskon %:</label><br>
        <input type="number" name="diskon" value="0" min="0" max="100" style="width:100%;padding:8px;margin:5px 0;"><br>
        <button type="submit" style="width:100%;padding:10px;background:#2196f3;color:white;border:none;border-radius:3px;">Pesan Sekarang</button>
    </form>
    <br>
    <a href="/login">🔐 Masuk Admin</a>
</body>
</html>
