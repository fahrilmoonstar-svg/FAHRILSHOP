    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f0f4f8; color:#333; }

        /* 🎨 Efek Strobo & Efek Ketik */
        .strobo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .typewriter {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            z-index: 10000;
            display: flex;
            gap: 4px;
        }
        .typewriter-letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            animation: ketik 0.3s ease forwards;
        }
        @keyframes ketik {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🎨 Gaya Toko */
        header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 1.2rem;
            text-align: center;
            border-radius: 0 0 12px 12px;
            margin-top: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        h2 {
            text-align: center;
            margin: 1.5rem 0;
            color: #1e40af;
        }
        .produk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .kartu {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .kartu:hover {
            transform: translateY(-3px);
        }
        .foto-produk {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f3f4f6;
        }
        .isi-kartu {
            padding: 1rem;
        }
        h3 {
            margin-bottom: 0.5rem;
            color: #1e40af;
            font-size: 1.1rem;
        }
        .deskripsi {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.8rem;
        }
        .harga {
            font-weight: bold;
            color: #15803d;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        .tombol-beli {
            display: block;
            text-align: center;
            background: #2563eb;
            color: white;
            padding: 0.7rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .tombol-beli:hover {
            background: #1d4ed8;
        }

        /* 🎨 Gaya Elemen Interaktif Baru */
        .interaktif {
            text-align: center;
            margin: 2rem 0;
            padding: 1rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        #title {
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }
        #btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        #btn:hover {
            background: #1d4ed8;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>

    strobo.style.display = 'none';

    typeDiv.innerHTML = '';

        let span = document.createElement('span');
        span.className = 'typewriter-letter';
        span.textContent = l;
        span.style.animationDelay = `${idx * 120}ms`;
        typeDiv.appendChild(span);
    });

    setTimeout(() => {
        typeDiv.style.opacity = '0';
        typeDiv.style.transition = 'opacity 0.4s ease';

// 🤖 FUNGSI HANDLER PESAN BOT
const config = {
    prefix: '.'
};

async function updateUser(jid, data) {
    if (!window.userData) window.userData = {};
    if (!window.userData[jid]) window.userData[jid] = {};
    Object.assign(window.userData[jid], data);
    return window.userData[jid];
}

async function executeCommand(sock, m, cmd, args) {
    console.log(`Perintah: ${cmd}, Argumen: ${args}`);
    if (cmd === 'menu') {
        await sock.sendMessage(m.key.remoteJid, {
            text: `📋 MENU FAHRIL SHOP 🛒\n\n• .mlbb → Daftar harga MLBB\n• .ff → Daftar harga Free Fire\n• .edit → Jasa edit video\n• .kuota → Daftar paket data`
        });
    }
}

async function handleMessage(sock, m) {
    if (!m.message || !m.key?.remoteJid) return;
    const from = m.key.remoteJid;
    const text = (m.message.conversation || m.message.extendedTextMessage?.text || "").trim();
    if (!text || !text.startsWith(config.prefix)) return;
    const argsArray = text.slice(config.prefix.length).trim().split(/\s+/);
    const cmd = argsArray.shift().toLowerCase();
    const args = argsArray.join(" ");
    await updateUser(from, { lastUsed: Date.now() });
    await executeCommand(sock, m, cmd, args);
}

if (typeof module !== 'undefined' && module.exports) {
    module.exports = { handleMessage };
}
