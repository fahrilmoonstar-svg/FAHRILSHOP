<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Permainan Tebak Angka</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:480px;margin:auto;text-align:center;}
        .pesan{padding:15px;border-radius:8px;margin:15px 0;}
        .benar{background:#e8f5e9;color:#2e7d32;}
        .salah{background:#ffebee;color:#c62828;}
        input{width:150px;padding:10px;text-align:center;font-size:18px;border:2px solid #ddd;border-radius:5px;}
        button{padding:10px 20px;margin:10px 5px;border:none;border-radius:5px;font-size:16px;cursor:pointer;}
        .btn-mulai{background:#2196f3;color:white;}
        .btn-tebak{background:#4caf50;color:white;}
        .btn-kembali{background:#9e9e9e;color:white;margin-top:20px;display:inline-block;text-decoration:none;padding:10px 20px;border-radius:5px;}
    </style>
</head>
<body>
    <h2>🎮 PERMAINAN TEBAK ANGKA</h2>
    <p>Tebak angka dari 1 sampai 10 ya!</p>

    {% if pesan %}
        <div class="pesan {% if 'BENAR' in pesan %}benar{% else %}salah{% endif %}">
            {{ pesan }}
        </div>
    {% endif %}

    <form method="POST">
        <button type="submit" name="mulai" class="btn-mulai">🔄 Mulai Permainan</button>
        <br><br>
        <input type="number" name="tebakan" placeholder="Masukkan Angka" min="1" max="10">
        <br>
        <button type="submit" name="tebak" class="btn-tebak">✅ Cek Tebakan</button>
    </form>

    <br>
    <a href="/" class="btn-kembali">⬅ Kembali ke Toko</a>
</body>
</html>
