<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Game Harta Karun</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{overflow:hidden;background:#1a1a2e;font-family:Arial;}
        canvas{display:block;}
    </style>
</head>
<body>
    <script>
        // ==============================================
        // ⚙️ VARIABEL GLOBAL & PENYIMPANAN SKOR
        // ==============================================
        let skor = 0
        let nyawa = 100
        let daftarMusuh = []
        let daftarPlatform = []
        let skorTertinggi = parseInt(localStorage.getItem("skorTertinggi")) || 0

        // ==============================================
        // 🧑 KELAS KARAKTER UTAMA
        // ==============================================
        class Character {
            constructor() {
                this.hirara = {
                    x: 100,
                    y: 100,
                    lebar: 40,
                    tinggi: 50,
                    speed: 220,
                    lompatKuat: -350,
                    velY: 0,
                    diLantai: false,
                    isImuning: false,
                    hp: 100
                }
                this.seranganSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-quick-win-video-game-notification-299.mp3")
                this.lompatSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-jumping-in-a-video-game-2033.mp3")
                this.hitSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-mechanical-bling-210.mp3")
            }

            gerak(dt, arah) {
                this.hirara.x += arah * this.hirara.speed * dt
            }

            lompat() {
                if (this.hirara.diLantai) {
                    this.hirara.velY = this.hirara.lompatKuat
                    this.hirara.diLantai = false
                    this.lompatSound.currentTime = 0
                    this.lompatSound.play()
                }
            }

            activateImunMode() {
                if (this.hirara.isImuning) return

                this.seranganSound.currentTime = 0
                this.seranganSound.play()

                this.hirara.isImuning = true
                setTimeout(() => { this.hirara.isImuning = false }, 500)
                this.screenFlash()
            }

            screenFlash() {
                const flash = document.createElement("div")
                flash.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:white;opacity:0.6;pointer-events:none;z-index:9999;`
                document.body.appendChild(flash)
                setTimeout(() => { flash.style.opacity = 0; setTimeout(()=>flash.remove(),200) }, 50)
            }

            setupCollision() {
                engine.onColClass(this.hirara, "musuh", () => kurangiNyawa(5))

                engine.onColClass(this.hirara, "platform", (obj) => {
                    if (this.hirara.velY >= 0) {
                        this.hirara.y = obj.y - this.hirara.tinggi
                        this.hirara.velY = 0
                        this.hirara.diLantai = true
                    }
                })

                engine.onColClass({x:this.hirara.x-10, y:this.hirara.y, lebar:60, tinggi:50}, "musuh", (kar, musuh) => {
                    if (musuh.hp > 0) {
                        this.hitSound.currentTime = 0
                        this.hitSound.play()
                        musuh.hp -= 0.7
                        this.screenShake()
                        if(musuh.hp <= 0) {
                            musuh.hp = 0
                            skor += 10
                            updateUI()
                        }
                    }
                })
            }

            screenShake() {
                document.body.style.transition = "transform 0.1s"
                document.body.style.transform = "translate(-3px,3px)"
                setTimeout(() => {
                    document.body.style.transform = "translate(3px,-3px)"
                    setTimeout(()=> document.body.style.transform = "translate(0,0)", 100)
                }, 100)
            }

            update(dt) {
                const h = this.hirara
                h.velY += 900 * dt
                h.y += h.velY * dt

                if (h.x < 0) h.x = 0
                if (h.x > engine.width - h.lebar) h.x = engine.width - h.lebar

                if (h.velY < 0) {
                    engine.drawRect(h.x, h.y, h.lebar, h.tinggi, "#ffcc00")
                } else if (h.velY > 20) {
                    engine.drawRect(h.x, h.y, h.lebar, h.tinggi, "#ff6600")
                } else if (Math.abs(h.speed) > 10) {
                    engine.drawRect(h.x, h.y, h.lebar, h.tinggi, "#00ccff")
                } else {
                    engine.drawRect(h.x, h.y, h.lebar, h.tinggi, "#00ff88")
                }

                if (h.y > engine.height + 100) {
                    cekSkorAkhir()
                    alert(`GAME OVER! 💀\nSkor Kamu: ${skor}\nSkor Terbaik: ${skorTertinggi}`)
                    engine.stop()
                }
            }
        }

        // ==============================================
        // 🤖 KELAS MUSUH
        // ==============================================
        class Enemy {
            constructor(x, y, tipe="biasa") {
                this.x = x
                this.y = y
                this.lebar = tipe==="kuat" ? 40 : 32
                this.tinggi = tipe==="kuat" ? 40 : 32
                this.hp = tipe==="kuat" ? 3 : 1.5
                this.warna = tipe==="kuat" ? "#ff3333" : "#ff6666"
                daftarMusuh.push(this)
            }
            update(dt) {
                this.y += 80 * dt
                if (this.y > engine.height + 50) daftarMusuh = daftarMusuh.filter(m => m !== this)
            }
            draw() {
                engine.drawRect(this.x, this.y, this.lebar, this.tinggi, this.warna)
            }
        }

        // ==============================================
        // 🪜 KELAS PLATFORM
        // ==============================================
        class Platform {
            constructor(x, y, lebar=120, tinggi=15) {
                this.x = x
                this.y = y
                this.lebar = lebar
                this.tinggi = tinggi
                daftarPlatform.push(this)
            }
            draw() {
                engine.drawRect(this.x, this.y, this.lebar, this.tinggi, "#6666ff")
            }
        }

        // ==============================================
        // 🔄 SISTEM SPAWN & PERMAINAN
        // ==============================================
        function mulaiPermainan() {
            new Platform(0, engine.height - 30, engine.width, 30)

            setInterval(() => {
                const acakX = Math.random() * (engine.width - 150)
                new Platform(acakX, engine.height - 150 - Math.random()*200)
            }, 1200)

            setInterval(() => {
                const x = Math.random()*(engine.width-60) + 30
                const tipe = Math.random()>0.7 ? "kuat" : "biasa"
                new Enemy(x, -50, tipe)
            }, 1800)
        }

        // ==============================================
        // 🏆 SISTEM SKOR TERTINGGI
        // ==============================================
        function cekSkorAkhir() {
            if (skor > skorTertinggi) {
                skorTertinggi = skor
                localStorage.setItem("skorTertinggi", skorTertinggi)
            }
        }

        function resetSkor() {
            skor = 0
            nyawa = 100
            daftarMusuh = []
            daftarPlatform = []
            updateUI()
        }

        // ==============================================
        // 📊 TAMPILAN UI
        // ==============================================
        function buatUI() {
            const ui = document.createElement("div")
            ui.id = "gameUI"
            ui.style.cssText = `position:fixed;top:10px;left:10px;color:white;font-size:16px;font-weight:bold;z-index:10000;text-shadow:0 0 5px black;`
            ui.innerHTML = `
                ❤️ NYAWA: <span id="nyawa">100</span><br>
                ⭐ SKOR: <span id="skor">0</span><br>
                <span style="color:#FFD700;">🏆 TERBAIK: <span id="terbaik">${skorTertinggi}</span></span><br>
                <div style="width:140px;height:8px;background:#333;border-radius:4px;margin-top:5px;overflow:hidden;">
                    <div id="barNyawa" style="height:100%;width:100%;background:#4CAF50;transition:0.3s;"></div>
                </div>
                <div style="font-size:12px;margin-top:8px;">← → Gerak | SPACE Lompat & Serang</div>
                <button onclick="ulangiGame()" style="margin-top:10px;padding:5px 10px;background:#e91e63;color:white;border:none;border-radius:4px;cursor:pointer;">🔄 MAIN LAGI</button>
                <br><a href="/" style="color:white;font-size:12px;margin-top:10px;display:inline-block;">⬅ Kembali ke Toko</a>
            `
            document.body.appendChild(ui)
        }

        function updateUI() {
            document.getElementById("nyawa").textContent = nyawa
            document.getElementById("skor").textContent = skor
            document.getElementById("terbaik").textContent = skorTertinggi
            const bar = document.getElementById("barNyawa")
            bar.style.width = nyawa + "%"
            bar.style.backgroundColor = nyawa <=30 ? "#ff4444" : nyawa <=60 ? "#ffbb33" : "#4CAF50"
        }

        function kurangiNyawa(jum) {
            nyawa = Math.max(0, nyawa - jum)
            updateUI()
        }

        function ulangiGame() {
            resetSkor()
            engine.restart()
        }

        // ==============================================
        // 🎮 KONTROL TOMBOL
        // ==============================================
        const tombol = { kiri:false, kanan:false, spasi:false }

        document.addEventListener("keydown", e => {
            if(e.key === "ArrowLeft") tombol.kiri = true
            if(e.key === "ArrowRight") tombol.kanan = true
            if(e.code === "Space") {
                tombol.spasi = true
                player.lompat()
                player.activateImunMode()
            }
        })

        document.addEventListener("keyup", e => {
            if(e.key === "ArrowLeft") tombol.kiri = false
            if(e.key === "ArrowRight") tombol.kanan = false
            if(e.code === "Space") tombol.spasi = false
        })

        // ==============================================
        // 🚀 JALANKAN GAME
        // ==============================================
        buatUI()
        const player = new Character()

        engine.setup(480, 720)
        engine.onStart(() => {
            resetSkor()
            player.setupCollision()
            mulaiPermainan()
            new Platform(50, engine.height - 120)
            new Platform(220, engine.height - 220)
            new Platform(400, engine.height - 170)
        })

        engine.onUpdate((dt) => {
            if(tombol.kiri) player.gerak(dt, -1)
            if(tombol.kanan) player.gerak(dt, 1)
            daftarMusuh.forEach(m => { m.update(dt); m.draw() })
            daftarPlatform.forEach(p => p.draw())
            player.update(dt)
        })

        engine.start()
    </script>
</body>
</html>
