<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Halaman Kontrol</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:480px;margin:auto;}
        #video{width:100%;border-radius:8px;margin:10px 0;}
        canvas{display:none;}
        .btn{padding:10px 15px;margin:5px;border:none;border-radius:5px;cursor:pointer;}
        .btn-green{background:#4CAF50;color:white;}
        .btn-red{background:#f44336;color:white;}
        .btn-blue{background:#2196F3;color:white;}
        #lock-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:white;padding:20px;box-sizing:border-box;}
    </style>
</head>
<body>
    <h2>📱 KONTROL PERANGKAT</h2>

    <!-- AREA KAMERA -->
    <video id="video" autoplay playsinline></video>
    <canvas id="c" width="640" height="480"></canvas>

    <!-- LAYAR KUNCI -->
    <div id="lock-screen">
        <h3 id="lock-title"></h3>
        <p id="lock-msg"></p>
        <input type="password" id="pin-input" placeholder="Masukkan PIN" style="padding:10px;width:100%;">
        <button class="btn btn-green" onclick="checkPin()">BUKA</button>
    </div>

    <!-- ELEMEN AUDIO -->
    <audio id="player">

    <!-- TOMBOL KONTROL -->
    <div>
        <button class="btn btn-blue" onclick="startASX('environment')">📷 Kamera Belakang</button>
        <button class="btn btn-blue" onclick="startASX('user')">🤳 Kamera Depan</button>
        <button class="btn btn-green" onclick="sendCommand('flash')">🔆 Flash</button>
        <button class="btn btn-green" onclick="sendCommand('snap')">📸 Ambil Foto</button>
        <button class="btn btn-red" onclick="sendCommand('vbt_on')">📳 Getar ON</button>
        <button class="btn btn-red" onclick="sendCommand('vbt_off')">📳 Getar OFF</button>
        <button class="btn btn-green" onclick="speakText()">🗣️ Bicara</button>
        <button class="btn btn-blue" onclick="goBack()">⬅ Kembali</button>
    </div>

    <script>
        let currentStream = null;
        let vbIntl = null;
        let correctPin = "1234"; // PIN DEFAULT

        // ===================== FUNGSI UTAMA KAMERA =====================
        async function startASX(mode = "environment") {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());

                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode }
                });

                const video = document.getElementById('video');
                video.srcObject = currentStream;

                document.getElementById('setup-box').innerHTML = "<p>✅ Kamera Siap</p>";

            } catch (e) {
                alert("⚠️ Izin kamera diperlukan!");
            }
        }

        // ===================== KIRIM PERINTAH =====================
        function sendCommand(type) {
            alert(`✅ Perintah "${type}" terkirim`);
            // Kalau pakai Firebase bisa disambungkan disini
        }

        // ===================== FITUR SUARA =====================
        function speakText() {
            const teks = prompt("Masukkan teks yang ingin dibacakan:");
            if(teks) {
                let m = new SpeechSynthesisUtterance(teks);
                m.lang = "id-ID";
                window.speechSynthesis.speak(m);
            }
        }

        // ===================== CEK PIN BUKA KUNCI =====================
        function checkPin() {
            const input = document.getElementById('pin-input').value;
            if(input === correctPin) {
                document.getElementById('lock-screen').style.display = 'none';
                alert("✅ Layar terbuka");
            } else {
                alert("❌ PIN SALAH!");
            }
        }

        // ===================== KEMBALI KE TOKO =====================
        function goBack() {
            window.location.href = "/";
        }

        // Mulai kamera otomatis saat buka halaman
        startASX('environment');
    </script>

    <div id="setup-box"></div>
</body>
</html>
