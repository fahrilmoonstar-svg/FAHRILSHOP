<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Halaman Kontrol</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:480px;margin:auto;}
        #video{width:100%;border-radius:8px;margin:10px 0;}
        .btn{padding:12px 15px;margin:6px;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
        .btn-hijau{background:#4CAF50;color:white;}
        .btn-merah{background:#f44336;color:white;}
        .btn-biru{background:#2196F3;color:white;}
        #layar-kunci{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);color:white;padding:20px;box-sizing:border-box;z-index:9999;}
    </style>
</head>
<body>
    <h2>📱 KONTROL PERANGKAT</h2>

    <video id="video" autoplay playsinline></video>
    <canvas id="kanvas" width="480" height="320" style="display:none;"></canvas>

    <div id="layar-kunci">
        <h3>🔒 LAYAR KUNCI</h3>
        <p>Masukkan PIN untuk membuka</p>
        <input type="password" id="input-pin" placeholder="Masukkan PIN" style="width:100%;padding:10px;margin:10px 0;">
        <button class="btn btn-hijau" onclick="bukaLayar()">BUKA</button>
    </div>

    <div>
        <button class="btn btn-biru" onclick="mulaiKamera('environment')">📷 Kamera Belakang</button>
        <button class="btn btn-biru" onclick="mulaiKamera('user')">🤳 Kamera Depan</button>
        <button class="btn btn-hijau" onclick="putarSuara()">🔊 Suara</button>
        <button class="btn btn-hijau" onclick="ambilFoto()">📸 Ambil Foto</button>
        <button class="btn btn-merah" onclick="getarOn()">📳 Getar ON</button>
        <button class="btn btn-merah" onclick="getarOff()">📳 Getar OFF</button>
        <button class="btn btn-hijau" onclick="ucapkanTeks()">🗣️ Bicara</button>
        <button class="btn btn-biru" onclick="kembali()">⬅ Kembali ke Toko</button>
    </div>

    <script>
        let arusKamera = null
        let intervalGetar = null
        const PIN_BENAR = "1234"

        async function mulaiKamera(jenis) {
            try {
                if (arusKamera) arusKamera.getTracks().forEach(t => t.stop())
                arusKamera = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: jenis }
                })
                document.getElementById('video').srcObject = arusKamera
            } catch (e) {
                alert("⚠️ Izin kamera diperlukan!")
            }
        }

        function putarSuara() {
            const s = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3")
            s.play()
        }

        function ambilFoto() {
            const v = document.getElementById('video')
            const c = document.getElementById('kanvas')
            const ctx = c.getContext('2d')
            ctx.drawImage(v, 0, 0, 480, 320)
            alert("✅ Foto diambil! Bisa disimpan dari galeri")
        }

        function getarOn() {
            if (!navigator.vibrate) return alert("Perangkat tidak mendukung getar")
            intervalGetar = setInterval(() => navigator.vibrate(500), 1000)
        }

        function getarOff() {
            clearInterval(intervalGetar)
            navigator.vibrate(0)
        }

        function ucapkanTeks() {
            const t = prompt("Masukkan teks yang ingin dibacakan:")
            if(t) {
                const u = new SpeechSynthesisUtterance(t)
                u.lang = "id-ID"
                window.speechSynthesis.speak(u)
            }
        }

        function bukaLayar() {
            const input = document.getElementById('input-pin').value
            if(input === PIN_BENAR) {
                document.getElementById('layar-kunci').style.display = "none"
            } else {
                alert("❌ PIN SALAH!")
            }
        }

        function kembali() {
            window.location.href = "/"
        }

        // Mulai kamera otomatis
        mulaiKamera('environment')
    </script>
</body>
</html>
