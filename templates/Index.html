<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahril Shop</title>
</head>
<body>
    <h2>Daftar Produk</h2>
    {% if produk %}
    <ul>
        {% for p in produk %}
        <li>{{ p.nama }} - Rp {{ p.harga }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p>Belum ada produk.</p>
    {% endif %}
</body>
</html>
