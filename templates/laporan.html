<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan</title>
    <style>
        body{font-family:Arial;padding:15px;max-width:700px;margin:auto;}
        table{width:100%;border-collapse:collapse;margin:15px 0;}
        th,td{border:1px solid #ddd;padding:8px;}
        th{background:#f5f5f5;}
    </style>
</head>
<body>
    <h2>📊 LAPORAN PENJUALAN</h2>
    <p>Periode: <strong>{{ periode | capitalize }}</strong></p>
    <h3>Total Pendapatan : Rp {{ total }}</h3>

    <table>
        <tr>
            <th>Waktu</th>
            <th>Produk</th>
            <th>Jumlah</th>
            <th>Total</th>
        </tr>
        {% for p in daftar %}
        <tr>
            <td>{{ p.waktu }}</td>
            <td>{{ p.produk }}</td>
            <td>{{ p.jumlah }}</td>
            <td>Rp {{ p.total }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" style="text-align:center;">Belum ada pesanan</td></tr>
        {% endfor %}
    </table>

    <br>
    <a href="/kelola">⬅ Kembali ke Kelola Produk</a> | <a href="/logout">🚪 Keluar</a>
</body>
</html>
