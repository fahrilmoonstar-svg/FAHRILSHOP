        .deskripsi { font-size:.9rem; color:#666; margin-bottom:.8rem; }

        .tombol-beli:hover { background:#1d4ed8; }

        .pemisah { margin:3rem 0; height:3px; background:linear-gradient(90deg, transparent, #2563eb, transparent); border:none; }
        .judul-game { text-align:center; color:#1e40af; font-size:1.5rem; margin-bottom:1rem; }
        .tombol-buka-game { display:block; max-width:300px; margin:0 auto; text-align:center; background:#16a34a; color:white; padding:1rem; border-radius:8px; text-decoration:none; font-weight:bold; font-size:1.1rem; }
        .tombol-buka-game:hover { background:#15803d; }
        #areaGame { display:none; max-width:640px; margin:1.5rem auto 0; background:#111; border-radius:12px; padding:10px; }

// === FUNGSI TAMPILAN ===
let kategoriTerpilih = "Semua";
const daftarKategori = ["Semua", ...new Set(dataToko.produk.map(p => p.kategori))];

function buatFilter() {
    const wadah = document.getElementById("tombolFilter");
    wadah.innerHTML = "";
    daftarKategori.forEach(kat => {
        const tombol = document.createElement("button");
        tombol.className = `filter-btn ${kat === kategoriTerpilih ? "active" : ""}`;
        tombol.textContent = kat;
        tombol.onclick = () => {
            kategoriTerpilih = kat;
            tampilkanProduk();
            buatFilter();
        };
        wadah.appendChild(tombol);
    });
}

function tampilkanProduk() {
    const kataKunci = document.getElementById("cariProduk").value.toLowerCase();
    const wadah = document.getElementById("daftarProduk");
    wadah.innerHTML = "";

    const hasil = dataToko.produk.filter(p => {
        const cocokKategori = kategoriTerpilih === "Semua" || p.kategori === kategoriTerpilih;
        const cocokCari = p.nama.toLowerCase().includes(kataKunci) || p.deskripsi.toLowerCase().includes(kataKunci);
        return cocokKategori && cocokCari;
    });

    hasil.forEach(produk => {
        const kartu = document.createElement("div");
        kartu.className = "kartu";
        kartu.innerHTML = `
            <img src="${produk.gambar || '#'}" alt="${produk.nama}" class="foto-produk" ${produk.gambar ? '' : 'style="display:none;"'}>
            <div class="isi-kartu">
                <h3>${produk.nama}</h3>
                <p class="deskripsi">${produk.deskripsi}</p>
                <p class="harga">${produk.harga}</p>
                <a href="https://wa.me/${dataToko.kontakWa}?text=${encodeURIComponent(produk.pesan)}" class="tombol-beli" target="_blank">Pesan via WhatsApp</a>
            </div>
        `;
        wadah.appendChild(kartu);
    });
}

document.getElementById("cariProduk").addEventListener("input", tampilkanProduk);
buatFilter();
tampilkanProduk();

// === FUNGSI GAME ULAR ===
function munculkanGame() {
    const area = document.getElementById("areaGame");
    area.classList.toggle("show");
    if(area.classList.contains("show")) mulaiGame();
}

function mulaiGame() {
    const wadah = document.getElementById("wadahGame");
    wadah.innerHTML = `<canvas id="papan" width="620" height="400" style="background:#1a1a1a; border-radius:8px;"></canvas>`;
    const kanvas = document.getElementById("papan");
    const ctx = kanvas.getContext("2d");
    const ukuran = 20;
    let ular = [{x:10, y:10}];
    let arah = {x:1, y:0};
    let makanan = {x:15, y:15};
    let poin = 0;

    document.onkeydown = e => {
        if(e.key === "ArrowUp" && arah.y === 0) arah = {x:0, y:-1};
        if(e.key === "ArrowDown" && arah.y === 0) arah = {x:0, y:1};
        if(e.key === "ArrowLeft" && arah.x === 0) arah = {x:-1, y:0};
        if(e.key === "ArrowRight" && arah.x === 0) arah = {x:1, y:0};
    };

    setInterval(() => {
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0,0, kanvas.width, kanvas.height);

        ctx.fillStyle = "#ef4444";
        ctx.fillRect(makanan.x*ukuran, makanan.y*ukuran, ukuran-2, ukuran-2);

        ular.unshift({x:ular[0].x+arah.x, y:ular[0].y+arah.y});
        if(ular[0].x === makanan.x && ular[0].y === makanan.y) {
            poin++;
            makanan = {x:Math.floor(Math.random()*(kanvas.width/ukuran)), y:Math.floor(Math.random()*(kanvas.height/ukuran))};
        } else {
            ular.pop();
        }

        ular.forEach((bagian, i) => {
            ctx.fillStyle = i === 0 ? "#22c55e" : "#4ade80";
            ctx.fillRect(bagian.x*ukuran, bagian.y*ukuran, ukuran-2, ukuran-2);
        });

        if(ular[0].x <0 || ular[0].x >= kanvas.width/ukuran || ular[0].y <0 || ular[0].y >= kanvas.height/ukuran) {
            alert("Game Over! Poin kamu: " + poin);
            ular = [{x:10, y:10}];
            arah = {x:1, y:0};
            poin = 0;
        }
    }, 120);
}
