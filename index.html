<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAHRIL SHOP 🛒 | Layanan Digital & Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@rexjs/rex-virtual-joystick-plugin/dist/rexvirtualjoystickplugin.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f0f4f8; color:#333; }

        /* 🔒 Proteksi & Efek Pembuka */
        .strobo { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; transition:opacity .2s ease; pointer-events:none; }
        .typewriter { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:32px; font-weight:bold; color:#fff; z-index:10000; display:flex; gap:4px; }
        .typewriter-letter { display:inline-block; opacity:0; transform:translateY(10px); animation:ketik .3s ease forwards; }
        @keyframes ketik { to { opacity:1; transform:translateY(0); } }

        /* Header & Umum */
        header { background:linear-gradient(135deg, #2563eb, #1d4ed8); color:white; padding:1.2rem; text-align:center; border-radius:0 0 12px 12px; margin-top:1rem; }
        .container { max-width:1200px; margin:0 auto; padding:1rem; }
        h2 { text-align:center; margin:1.5rem 0; color:#1e40af; }

        /* Pencarian & Filter Produk */
        .search-box { max-width:500px; margin:0 auto 1.5rem; position:relative; }
        #cariProduk { width:100%; padding:.8rem 1rem; padding-left:2.5rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem; outline:none; transition:border .2s; }
        #cariProduk:focus { border-color:#2563eb; }
        .search-icon { position:absolute; left:.8rem; top:50%; transform:translateY(-50%); color:#94a3b8; }
        .filter-wrapper { display:flex; flex-wrap:wrap; gap:.8rem; justify-content:center; margin-bottom:2rem; }
        .filter-btn { padding:.6rem 1.2rem; border:none; border-radius:8px; background:#e2e8f0; color:#1e293b; font-weight:500; cursor:pointer; transition:all .2s ease; }
        .filter-btn.active { background:#2563eb; color:white; box-shadow:0 2px 6px rgba(37,99,235,.3); }
        .filter-btn:hover:not(.active) { background:#cbd5e1; }

        /* Daftar Produk Digital */
        .produk-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:1.2rem; }
        .kartu { background:white; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.1); overflow:hidden; transition:transform .2s; }
        .kartu:hover { transform:translateY(-3px); }
        .foto-produk { width:100%; height:180px; object-fit:cover; background:#f3f4f6; }
        .isi-kartu { padding:1rem; }
        h3 { margin-bottom:.5rem; color:#1e40af; font-size:1.1rem; }
        .deskripsi { font-size:.9rem; color:#666; margin-bottom:.8rem; }
        .harga { font-weight:bold; color:#15803d; font-size:1.1rem; margin-bottom:1rem; }
        .tombol-beli { display:block; text-align:center; background:#2563eb; color:white; padding:.7rem; border-radius:6px; text-decoration:none; font-weight:500; transition:background .2s; }
        .tombol-beli:hover { background:#1d4ed8; }

        /* 🆕 BAGIAN GAME ULAR */
        .pemisah { margin:3rem 0; height:3px; background:linear-gradient(90deg, transparent, #2563eb, transparent); border:none; }
        .judul-game { text-align:center; color:#1e40af; font-size:1.6rem; margin-bottom:1rem; }
        .keterangan-game { text-align:center; color:#64748b; margin-bottom:1.5rem; }
        .wadah-game { max-width:660px; margin:0 auto; background:#111; border-radius:12px; padding:10px; box-shadow:0 4px 12px rgba(0,0,0,.15); display:flex; justify-content:center; }
        #areaGame { width:100%; max-width:640px; height:480px; border-radius:8px; overflow:hidden; }

        /* Footer */
        footer { text-align:center; padding:1.5rem; margin-top:2rem; color:#666; font-size:.9rem; }
    </style>
</head>
<body>

<!-- Efek Pembuka -->
<div class="strobo"></div>
<div class="typewriter"></div>

<!-- Konten Utama Toko -->
<div id="konten-toko"></div>

<!-- 🆕 BAGIAN GAME ULAR -->
<hr class="pemisah">
<div class="container">
    <h2 class="judul-game">🎮 Main Game Ular Dulu Yuk!</h2>
    <p class="keterangan-game">Geser tombol kendali di bawah kiri untuk arahkan ular makan makanan merah</p>
    <div class="wadah-game">
        <div id="areaGame"></div>
    </div>
</div>

<script>
// 🔒 Proteksi Kode
document.oncontextmenu = () => false;
document.onkeydown = (e) => {
    if ((e.ctrlKey && [83,85,67].includes(e.keyCode)) || e.keyCode === 123) { e.preventDefault(); return false; }
};

// 🎬 Efek Pembuka
const strobo = document.querySelector('.strobo');
const typeDiv = document.querySelector('.typewriter');
let interval = setInterval(() => { strobo.style.opacity = strobo.style.opacity === '1' ? '0' : '1'; }, 150);
setTimeout(() => {
    clearInterval(interval);
    strobo.style.opacity = '0';
    setTimeout(() => strobo.style.display = 'none', 200);
    const teks = ['F','A','H','R','I','L',' ','S','H','O','P'];
    teks.forEach((huruf, i) => {
        const span = document.createElement('span');
        span.className = 'typewriter-letter';
        span.textContent = huruf;
        span.style.animationDelay = `${i * 120}ms`;
        typeDiv.appendChild(span);
    });
    setTimeout(() => { typeDiv.style.opacity = '0'; }, 2500);
}, 3000);

// 🚀 Variabel Global Toko
let dataToko = {};
let kataKunci = "";

// 🚀 Muat & Tampilkan Produk dari JSON
async function tampilkanProduk(kategoriPilih = "Semua") {
    try {
        const res = await fetch('produk.json');
        dataToko = await res.json();
        const daftarKategori = ["Semua", ...new Set(dataToko.produk.map(p => p.kategori))];
        
        const produkFilter = dataToko.produk.filter(item => {
            const cocokKategori = kategoriPilih === "Semua" || item.kategori === kategoriPilih;
            const cocokCari = item.nama.toLowerCase().includes(kataKunci.toLowerCase()) || item.keterangan.toLowerCase().includes(kataKunci.toLowerCase());
            return cocokKategori && cocokCari;
        });

        document.getElementById('konten-toko').innerHTML = `
            <header><h1>${dataToko.toko.nama} 🛒</h1><p>${dataToko.toko.tagline}</p></header>
            <div class="container">
                <h2>Daftar Layanan Digital Kami</h2>
                <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="cariProduk" placeholder="Cari layanan..." value="${kataKunci}"></div>
                <div class="filter-wrapper">${daftarKategori.map(k => `<button class="filter-btn ${k === kategoriPilih ? 'active' : ''}" onclick="tampilkanProduk('${k}')">${k}</button>`).join('')}</div>
                <div class="produk-grid">
                    ${produkFilter.length > 0 ? produkFilter.map(item => `
                        <div class="kartu">
                            <img src="${item.gambar}" alt="${item.nama}" class="foto-produk" loading="lazy">
                            <div class="isi-kartu">
                                <h3>${item.nama}</h3>
                                <p class="deskripsi">${item.keterangan}</p>
                                <div class="harga">${item.harga}</div>
                                <a href="https://wa.me/${dataToko.toko.kontak}?text=${encodeURIComponent(item.pesan_wa)}" target="_blank" class="tombol-beli">Pesan Sekarang</a>
                            </div>
                        </div>
                    `).join('') : `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#64748b;">😞 Layanan tidak ditemukan</div>`}
                </div>
            </div>
        `;

        // Aktifkan fitur pencarian
        document.getElementById('cariProduk').addEventListener('input', (e) => {
            kataKunci = e.target.value;
            tampilkanProduk(kategoriPilih);
        });
    } catch (err) {
        document.getElementById('konten-toko').innerHTML = `<div style="text-align:center; padding:3rem; color:red;">❌ Pastikan file <b>produk.json</b> ada di folder yang sama!</div>`;
        console.error(err);
    }
}

// 🎮 LOGIKA GAME ULAR (PERSIS SESUAI KODE ASLI)
const engine = new Phaser.Game({
    type: Phaser.AUTO,
    width: 640,
    height: 480,
    parent: 'areaGame',
    scene: { create: createGame },
    plugins: {
        global: [{ key: 'rexVirtualJoystick', plugin: RexVirtualJoystickPlugin, start: true }]
    }
});

let snake = [];
let food;
const grid = 32;
const baseCfg = { size: grid-2, origin: 0.5 };

function createGame() {
    const analog = this.plugins.get('rexVirtualJoystick').add(this, {
        x: 100, y: 380, radius: 50,
        base: this.add.circle(0,0,50, 0x444444),
        thumb: this.add.circle(0,0,25, 0x888888),
        dir: 4, preventReverse: true
    });

    const speed = 0.15;
    let timer = 0;

    // Awal ular
    snake.push(this.add.rectangle(grid*5, grid*5, baseCfg.size, baseCfg.size, 0x0000ff));
    randomFood(this);

    // Sistem gerakan persis seperti gambar
    this.events.addListener("postupdate", dt => {
        timer += dt / 1000;

        if(timer >= speed) {
            timer = 0;

            const head = snake[0];
            head.fillColor = "yellow";

            const arah = analog.stepDir4();
            const newHead = {
                ...baseCfg, color: "blue",
                x: head.x + arah.x * grid,
                y: head.y + arah.y * grid
            };

            snake.unshift(this.add.rectangle(newHead.x, newHead.y, newHead.size, newHead.size, 0x0000ff));

            if(newHead.x === food.x && newHead.y === food.y) {
                randomFood(this);
            } else {
                snake.pop().destroy();
            }
        }
    });
}

function randomFood(scene) {
    if(food) food.destroy();
    const x = Phaser.Math.Between(0, 19) * grid + grid/2;
    const y = Phaser.Math.Between(0, 14) * grid + grid/2;
    food = scene.add.rectangle(x, y, grid-2, grid-2, 0xff0000);
}

// Jalankan saat halaman siap
window.onload = tampilkanProduk;

// 🤖 Fungsi Bot Tetap Tersedia
const config = { prefix: '.' };
async function updateUser(jid, data) {
    if (!window.userData) window.userData = {};
    if (!window.userData[jid]) window.userData[jid] = {};
    Object.assign(window.userData[jid], data);
    return window.userData[jid];
}
async function executeCommand(sock, m, cmd, args) {
    if (cmd === 'menu') {
        await sock.sendMessage(m.key.remoteJid, { text: `📋 MENU ${dataToko?.toko?.nama || 'FAHRIL SHOP'} 🛒\n\n• .mlbb → Daftar MLBB\n• .ff → Daftar Free Fire\n• .edit → Jasa Edit\n• .kuota → Paket Data\n• .game → Main Ular` });
    }
}
async function handleMessage(sock, m) {
    if (!m.message || !m.key?.remoteJid) return;
    const teks = (m.message.conversation || m.message.extendedTextMessage?.text || "").trim();
    if (!teks || !teks.startsWith(config.prefix)) return;
    const argsArray = teks.slice(config.prefix.length).trim().split(/\s+/);
    const cmd = argsArray.shift().toLowerCase();
    await updateUser(m.key.remoteJid, { lastUsed: Date.now() });
    await executeCommand(sock, m, cmd, argsArray.join(" "));
}
if (typeof module !== 'undefined') module.exports = { handleMessage };
</script>

</body>
</html>
